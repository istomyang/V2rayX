name: Build macOS App and Upload to Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    
jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Step 1 - Change directory and run a command
        run: |
          uname -m
          
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Xcode for building the app
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # Cache
      - name: Cache
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-build-${{ hashFiles('**/*.xcodeproj') }}
          restore-keys: ${{ runner.os }}--build
            
      # Build the macOS application
      - name: Build macOS app
        run: |
          xcodebuild -project V2rayX.xcodeproj -scheme V2rayX -configuration Release -sdk macosx -derivedDataPath $GITHUB_WORKSPACE/build
          xcodebuild -project V2rayX.xcodeproj -scheme V2rayX-CoreRunner -configuration Release -sdk macosx -derivedDataPath $GITHUB_WORKSPACE/build
          cd build/Build/Products/Release && zip -r V2rayX.zip V2rayX.app/ && cd -

      # Upload the .app bundle to GitHub Releases
      - name: Upload to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: build/Build/Products/Release/V2rayX.zip
          token: ${{ secrets.GITHUB_TOKEN }}
